<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  img-src 'self' data: blob:;
  connect-src 'self' https://*.supabase.co wss://*.supabase.co;
  frame-ancestors 'none';
  base-uri 'self';
  form-action 'self';
  object-src 'none';
  upgrade-insecure-requests;
">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=(), payment=(), usb=()">
<meta name="theme-color" content="#0E0E0F">
<meta name="robots" content="noindex,nofollow">
<title>BOSS Admin — Super-admin cross-tenant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0E0E0F;--char:#1A1A1C;--char2:#242427;--line:#34343A;--line2:#28282D;
  --gold:#C8A23A;--gold-dim:#8a6f28;--cream:#ECECEE;--cream-dim:#D8D8DC;
  --ok:#4c9c65;--warn:#e0a13a;--danger:#e05555;--info:#5a8fb8;
  --on-accent:#0E0E0F;
}
*{box-sizing:border-box}
body{margin:0;background:var(--black);color:var(--cream);font-family:'Inter',system-ui,sans-serif;font-size:14.5px;line-height:1.5}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit;font-size:14px}
.topbar{position:sticky;top:0;z-index:30;background:var(--char);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px}
.logo{font-family:'Archivo';font-weight:900;font-size:22px;color:var(--gold);letter-spacing:-.02em}
.logo .dot{color:var(--cream)}
.subline{color:var(--cream-dim);font-size:12.5px;text-transform:uppercase;letter-spacing:.08em}
.spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--char2);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12.5px}
.user-chip b{color:var(--gold)}
.user-chip .logout{background:none;border:none;color:var(--cream-dim);font-size:12px;padding:2px 4px;margin-left:6px}
.user-chip .logout:hover{color:var(--danger)}

.tabs{display:flex;gap:2px;background:var(--char);border-bottom:1px solid var(--line);padding:0 16px}
.tab{background:none;border:none;color:var(--cream-dim);padding:14px 16px;font-weight:600;font-size:13.5px;border-bottom:2px solid transparent}
.tab.on{color:var(--cream);border-bottom-color:var(--gold)}

.wrap{padding:22px 20px;max-width:1400px;margin:0 auto}
.wrap h1{font-family:'Archivo';font-weight:800;font-size:26px;margin:0 0 6px 0}
.wrap h2{font-family:'Archivo';font-weight:800;font-size:19px;margin:22px 0 12px 0}
.wrap .muted{color:var(--cream-dim)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:14px 0 24px 0}
.card{background:var(--char);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.card .lbl{font-size:11.5px;color:var(--cream-dim);text-transform:uppercase;letter-spacing:.06em}
.card .val{font-family:'Archivo';font-weight:800;font-size:24px;margin-top:4px;color:var(--cream)}
.card .sub{font-size:12px;color:var(--cream-dim);margin-top:2px}
.card.ok .val{color:var(--ok)}
.card.warn .val{color:var(--warn)}
.card.danger .val{color:var(--danger)}
.card.info .val{color:var(--info)}
.card.gold .val{color:var(--gold)}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.search{flex:1;min-width:220px;background:var(--char);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--cream)}
.search:focus{outline:none;border-color:var(--gold)}
.btn{background:var(--char);border:1px solid var(--line);border-radius:10px;padding:9px 14px;color:var(--cream);font-weight:600;font-size:13px}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--gold);color:var(--on-accent);border-color:var(--gold)}
.btn.primary:hover{background:var(--gold-dim);color:var(--cream)}
.btn.danger{color:var(--danger);border-color:var(--danger)}

table{width:100%;border-collapse:collapse;background:var(--char);border:1px solid var(--line);border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line2);font-size:13.5px}
th{background:var(--char2);color:var(--cream-dim);font-weight:600;text-transform:uppercase;font-size:11.5px;letter-spacing:.05em;cursor:pointer;user-select:none;position:sticky;top:0}
th:hover{color:var(--gold)}
tr:last-child td{border-bottom:none}
tr.row-click:hover{background:var(--char2);cursor:pointer}
td.num{text-align:right;font-variant-numeric:tabular-nums;font-family:'IBM Plex Mono',monospace,ui-monospace}
td .badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11.5px;font-weight:600}
td .badge.b-trial{background:rgba(90,143,184,.18);color:#8bb3d4}
td .badge.b-active{background:rgba(76,156,101,.2);color:#7dd095}
td .badge.b-grace{background:rgba(224,161,58,.2);color:#f3c162}
td .badge.b-locked{background:rgba(224,85,85,.2);color:#f19595}

.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:24px}
.modal.on{display:flex}
.modal-box{background:var(--char);border:1px solid var(--line);border-radius:14px;max-width:640px;width:100%;max-height:90vh;overflow:auto;padding:20px}
.modal-box h2{margin:0 0 16px 0}
.modal-close{float:right;background:none;border:none;color:var(--cream-dim);font-size:24px;line-height:1;padding:0 4px}

.login-wrap{max-width:420px;margin:80px auto;padding:32px;background:var(--char);border:1px solid var(--line);border-radius:16px;text-align:center}
.login-wrap h1{font-family:'Archivo';font-weight:800;font-size:28px;color:var(--gold);margin:0 0 8px 0}
.login-wrap .sub{color:var(--cream-dim);margin-bottom:24px;font-size:13.5px}
.field{width:100%;background:var(--char2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--cream);margin-bottom:10px}
.field:focus{outline:none;border-color:var(--gold)}
.login-wrap .status{margin-top:14px;font-size:13px;min-height:18px}
.deny{color:var(--danger);font-weight:700;margin-top:20px}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:640px){.detail-grid{grid-template-columns:1fr}}
.detail-card{background:var(--char2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.detail-card .k{color:var(--cream-dim);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.detail-card .v{font-weight:600}

.actions-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.err{color:var(--danger);margin-top:8px}
.ok{color:var(--ok);margin-top:8px}
</style>
</head>
<body>

<div id="app-login" style="display:none">
  <div class="login-wrap">
    <h1>BOSS<span style="color:var(--cream)">.admin</span></h1>
    <div class="sub">Espace super-admin. Réservé aux propriétaires de BOSS.</div>
    <input class="field" id="lg-email" type="email" placeholder="ton.email@exemple.com" autocomplete="email">
    <input class="field" id="lg-pw" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn primary" id="lg-signin" style="width:100%">Se connecter</button>
    <button class="btn" id="lg-signup" style="width:100%;margin-top:8px">Créer mon compte</button>
    <div style="text-align:center;color:var(--cream-dim);font-size:12px;margin:12px 0 6px 0">— ou —</div>
    <button class="btn" id="lg-magic" style="width:100%">Recevoir un lien par email (sans mot de passe)</button>
    <div class="status" id="lg-status"></div>
  </div>
</div>

<div id="app-shell" style="display:none">
  <div class="topbar">
    <div><div class="logo">BOSS<span class="dot">.</span></div><div class="subline">super-admin</div></div>
    <div class="spacer"></div>
    <div class="user-chip" id="user-chip"></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-t="vue">Vue d'ensemble</button>
    <button class="tab" data-t="clients">Clients</button>
    <button class="tab" data-t="rapports">Rapports</button>
    <button class="tab" data-t="admins">Super-admins</button>
  </div>
  <div class="wrap" id="app-body">Chargement…</div>
</div>

<div id="app-denied" style="display:none">
  <div class="login-wrap">
    <h1>Accès refusé</h1>
    <div class="sub">Votre compte n'a pas les droits super-admin sur BOSS.<br>Si vous pensez que c'est une erreur, contactez le propriétaire.</div>
    <button class="btn" id="deny-signout" style="width:100%">Se déconnecter</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>window.__BOSS_SUPABASE__ = window.__BOSS_SUPABASE__ || { url: "https://jqgogwydfncfidcuqcbb.supabase.co", anonKey: "sb_publishable_97wXHXP8FpZhwfyV7j0rew_xxRJ0hkU" };</script>
<script>/* ============================================================
   BOSS — client réseau (Supabase Auth + REST + Realtime)
   Aucune dépendance : uniquement fetch(), WebSocket, localStorage.
   Utilisable en Node (tests via jsdom + node-fetch polyfill).
   ============================================================ */

(function(root){
  "use strict";

  /* Configuration injectée au build par build.js
     (fallback vide → mode 100 % local, aucun appel réseau). */
  const CFG = (typeof root.__BOSS_SUPABASE__ === "object" && root.__BOSS_SUPABASE__) || {url:"",anonKey:""};

  const STORAGE_SESSION = "boss.session.v1";
  const STORAGE_QUEUE   = "boss.queue.v1";   // opérations en attente (mode dégradé)
  const AUTH_REFRESH_MARGIN = 60_000;         // renouveler le token 60s avant expiration

  /* ---------- utilitaires bas niveau ---------- */
  function isConfigured(){ return !!(CFG.url && CFG.anonKey); }
  function apiURL(path){ return CFG.url.replace(/\/+$/,"") + path; }
  function ls(){ try { return root.localStorage; } catch(_){ return null; } }
  function readJSON(key){
    const s = ls(); if(!s) return null;
    try { const v = s.getItem(key); return v?JSON.parse(v):null; } catch(_){ return null; }
  }
  function writeJSON(key,val){
    const s = ls(); if(!s) return;
    try { if(val==null) s.removeItem(key); else s.setItem(key,JSON.stringify(val)); } catch(_){}
  }

  /* ---------- état de session ---------- */
  let _session = null;   // {access_token, refresh_token, expires_at, user}
  const _authListeners = new Set();
  function loadSession(){
    _session = readJSON(STORAGE_SESSION);
    return _session;
  }
  function saveSession(s){
    _session = s;
    writeJSON(STORAGE_SESSION, s);
    _authListeners.forEach(fn => { try { fn(s); } catch(_){} });
  }
  function currentSession(){ return _session; }
  function currentUser(){ return _session && _session.user; }
  function onAuthChange(fn){ _authListeners.add(fn); return () => _authListeners.delete(fn); }

  /* ---------- fetch avec bearer ---------- */
  async function rawFetch(path, opts){
    if(!isConfigured()) throw new Error("Supabase non configuré (mode local seulement)");
    opts = opts || {};
    const headers = Object.assign({
      "apikey": CFG.anonKey,
      "Content-Type": "application/json",
      "Accept": "application/json"
    }, opts.headers || {});
    if(_session && _session.access_token && !opts.noAuth){
      headers["Authorization"] = "Bearer " + _session.access_token;
    }
    const url = apiURL(path);
    const res = await root.fetch(url, {
      method: opts.method || "GET",
      headers,
      body: opts.body ? (typeof opts.body === "string" ? opts.body : JSON.stringify(opts.body)) : undefined
    });
    let data = null;
    const ct = res.headers.get("content-type") || "";
    if(ct.indexOf("application/json") >= 0){
      try { data = await res.json(); } catch(_){ data = null; }
    } else {
      try { data = await res.text(); } catch(_){ data = null; }
    }
    if(!res.ok){
      const msg = (data && (data.message || data.error_description || data.error || data.msg)) || ("HTTP "+res.status);
      const err = new Error(msg); err.status = res.status; err.data = data;
      throw err;
    }
    return data;
  }

  /* ---------- rafraîchissement automatique du token ---------- */
  async function ensureFreshToken(){
    if(!_session || !_session.expires_at) return;
    const nowMs = Date.now();
    const expMs = _session.expires_at * 1000;
    if(expMs - nowMs > AUTH_REFRESH_MARGIN) return;
    if(!_session.refresh_token) return;
    try {
      const data = await rawFetch("/auth/v1/token?grant_type=refresh_token", {
        method: "POST",
        body: { refresh_token: _session.refresh_token },
        noAuth: true
      });
      saveSession({
        access_token: data.access_token,
        refresh_token: data.refresh_token || _session.refresh_token,
        expires_at: data.expires_at || Math.floor(Date.now()/1000) + (data.expires_in||3600),
        user: data.user || _session.user
      });
    } catch(e){
      if(e.status === 400 || e.status === 401){
        saveSession(null); // session invalide
      }
    }
  }

  async function authedFetch(path, opts){
    await ensureFreshToken();
    return rawFetch(path, opts);
  }

  /* ---------- AUTH ---------- */
  const auth = {
    async signUp(email, password, nom){
      const data = await rawFetch("/auth/v1/signup", {
        method: "POST",
        body: { email, password, data: nom ? {nom} : undefined },
        noAuth: true
      });
      // Supabase renvoie une session directement si "Confirm email" est désactivé,
      // sinon renvoie l'utilisateur sans session (l'utilisateur doit cliquer le lien reçu par email).
      if(data.access_token){
        saveSession({
          access_token: data.access_token,
          refresh_token: data.refresh_token,
          expires_at: data.expires_at || Math.floor(Date.now()/1000)+(data.expires_in||3600),
          user: data.user
        });
      }
      return data;
    },
    async signIn(email, password){
      const data = await rawFetch("/auth/v1/token?grant_type=password", {
        method: "POST",
        body: { email, password },
        noAuth: true
      });
      saveSession({
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: data.expires_at || Math.floor(Date.now()/1000)+(data.expires_in||3600),
        user: data.user
      });
      return data;
    },
    async magicLink(email, redirectTo){
      return rawFetch("/auth/v1/otp", {
        method: "POST",
        body: { email, create_user: true, options: redirectTo ? {email_redirect_to: redirectTo} : undefined },
        noAuth: true
      });
    },
    async signOut(){
      try {
        if(_session && _session.access_token){
          await rawFetch("/auth/v1/logout", { method: "POST" });
        }
      } catch(_){}
      saveSession(null);
    },
    async me(){
      if(!_session) return null;
      try {
        const u = await authedFetch("/auth/v1/user", { method: "GET" });
        _session.user = u;
        writeJSON(STORAGE_SESSION, _session);
        return u;
      } catch(e){
        if(e.status === 401) saveSession(null);
        return null;
      }
    },
    // Récupération d'une session depuis le fragment #access_token=... (après magic link)
    async captureFromURL(){
      if(!root.location || !root.location.hash) return null;
      const h = root.location.hash.substring(1);
      const p = {};
      h.split("&").forEach(pair => {
        const [k,v] = pair.split("=");
        if(k) p[decodeURIComponent(k)] = decodeURIComponent(v||"");
      });
      if(!p.access_token) return null;
      const s = {
        access_token: p.access_token,
        refresh_token: p.refresh_token,
        expires_at: p.expires_at ? parseInt(p.expires_at,10) : Math.floor(Date.now()/1000) + (parseInt(p.expires_in||"3600",10)),
        user: null
      };
      saveSession(s);
      // Nettoyer l'URL
      try {
        root.history && root.history.replaceState({}, "", root.location.pathname + root.location.search);
      } catch(_){}
      // Récupérer l'utilisateur
      await auth.me();
      return _session;
    },
    session: currentSession,
    user: currentUser,
    onChange: onAuthChange
  };

  /* ---------- REST (PostgREST) ---------- */
  function buildQS(params){
    if(!params) return "";
    const parts = [];
    Object.keys(params).forEach(k => {
      const v = params[k];
      if(v==null) return;
      parts.push(encodeURIComponent(k)+"="+encodeURIComponent(String(v)));
    });
    return parts.length ? ("?"+parts.join("&")) : "";
  }
  function db(table){
    return {
      async select(query){
        const qs = buildQS(Object.assign({select:"*"}, query||{}));
        return authedFetch("/rest/v1/"+table+qs, {method:"GET"});
      },
      async insert(row, opts){
        const headers = {"Prefer": (opts&&opts.returning==="minimal")?"return=minimal":"return=representation"};
        const res = await authedFetch("/rest/v1/"+table, {method:"POST", body:row, headers});
        return Array.isArray(res)?res[0]:res;
      },
      async upsert(row, opts){
        const headers = {"Prefer": "resolution=merge-duplicates,return=representation"};
        if(opts && opts.onConflict) headers["Prefer"] += ",resolution=merge-duplicates";
        const path = "/rest/v1/"+table+(opts&&opts.onConflict?("?on_conflict="+encodeURIComponent(opts.onConflict)):"");
        const res = await authedFetch(path, {method:"POST", body:row, headers});
        return Array.isArray(res)?res[0]:res;
      },
      async update(patch, filter){
        const qs = buildQS(filter||{});
        const headers = {"Prefer":"return=representation"};
        const res = await authedFetch("/rest/v1/"+table+qs, {method:"PATCH", body:patch, headers});
        return Array.isArray(res)?res:[];
      },
      async remove(filter){
        const qs = buildQS(filter||{});
        return authedFetch("/rest/v1/"+table+qs, {method:"DELETE"});
      }
    };
  }
  async function rpc(fn, args){
    return authedFetch("/rest/v1/rpc/"+fn, {method:"POST", body: args||{}});
  }

  /* ---------- API ORGANISATIONS / PROFILES ---------- */
  const org = {
    async list(){
      return db("organizations").select({order:"created_at.desc"});
    },
    async create(nom){
      return rpc("create_organization", {org_nom: nom});
    },
    async members(orgId){
      return db("memberships").select({organization_id:"eq."+orgId, order:"created_at.asc"});
    },
    async invite(orgId, email, role){
      return db("invitations").insert({organization_id: orgId, email: email, role: role||"collaborateur"});
    },
    async pendingInvitations(orgId){
      return db("invitations").select({organization_id:"eq."+orgId, accepted_at:"is.null"});
    },
    async acceptInvitation(token){
      return rpc("accept_invitation", {inv_token: token});
    },
    async updateMemberRole(orgId, userId, role, permissions){
      return db("memberships").update(
        {role, permissions: permissions||undefined},
        {organization_id:"eq."+orgId, user_id:"eq."+userId}
      );
    },
    async removeMember(orgId, userId){
      return db("memberships").remove({organization_id:"eq."+orgId, user_id:"eq."+userId});
    }
  };

  const profiles = {
    async pullAll(orgId){
      const rows = await db("profiles").select({
        organization_id:"eq."+orgId,
        deleted_at:"is.null",
        order:"updated_at.desc"
      });
      // Reconstruire l'état {profiles:{id:profile}} pour mergeStates
      const out = {profiles:{}, currentId:null, updatedAt:0};
      rows.forEach(r => {
        out.profiles[r.id] = r.data;
        const ts = new Date(r.updated_at).getTime();
        if(ts > out.updatedAt) out.updatedAt = ts;
      });
      if(rows.length) out.currentId = rows[0].id;
      return out;
    },
    async pushOne(orgId, profile){
      const row = {
        id: profile.id,
        organization_id: orgId,
        data: profile,
        updated_at: new Date().toISOString()
      };
      return db("profiles").upsert(row, {onConflict:"id"});
    },
    async pushMany(orgId, profileMap){
      const rows = Object.keys(profileMap).map(id => ({
        id, organization_id: orgId, data: profileMap[id],
        updated_at: new Date((profileMap[id].updatedAt)||Date.now()).toISOString()
      }));
      if(!rows.length) return [];
      return db("profiles").upsert(rows, {onConflict:"id"});
    },
    async softDelete(id){
      return db("profiles").update({deleted_at: new Date().toISOString()}, {id:"eq."+id});
    }
  };

  /* ---------- SYNC (haut niveau) ---------- */
  const sync = {
    // Effectue un pull + fusion + push si local a des changements plus récents
    // mergeFn(local, remote) → state fusionné (typiquement engine.mergeStates)
    // localState : {profiles:{}, currentId, updatedAt}
    // Retourne l'état fusionné et signale s'il faut le sauvegarder localement.
    async runOnce(orgId, localState, mergeFn){
      if(!isConfigured() || !_session) return {state: localState, changed: false, source:"local"};
      const remote = await profiles.pullAll(orgId);
      const merged = mergeFn(localState||{profiles:{},updatedAt:0}, remote);
      // Détecter les profils modifiés localement vs distant
      const toPush = {};
      let pushedAny = false;
      const localProfiles = (localState && localState.profiles) || {};
      Object.keys(merged.profiles).forEach(id => {
        const localP = localProfiles[id];
        const remoteP = remote.profiles[id];
        const mergedP = merged.profiles[id];
        if(!remoteP || (mergedP.updatedAt||0) > (remoteP.updatedAt||0)){
          toPush[id] = mergedP;
          pushedAny = true;
        }
        else if(localP && (localP.updatedAt||0) > (remoteP.updatedAt||0)){
          toPush[id] = localP;
          pushedAny = true;
        }
      });
      if(pushedAny){
        try { await profiles.pushMany(orgId, toPush); }
        catch(e){ /* on garde en file pour retry */ }
      }
      const changed = JSON.stringify(merged) !== JSON.stringify(localState);
      return {state: merged, changed, source: pushedAny?"push+pull":"pull"};
    }
  };

  /* ---------- REALTIME (Supabase Phoenix Channels, minimal) ---------- */
  let _ws = null, _wsRef = 1, _wsHandlers = {}, _hbTimer = null, _reconnectTimer = null;
  function realtimeConnect(){
    if(!isConfigured() || !_session) return null;
    if(_ws && (_ws.readyState === 0 || _ws.readyState === 1)) return _ws;
    if(typeof root.WebSocket !== "function") return null;
    const wsBase = CFG.url.replace(/^http/,"ws") + "/realtime/v1/websocket";
    const url = wsBase + "?apikey=" + encodeURIComponent(CFG.anonKey)
              + "&vsn=1.0.0"
              + "&log_level=warn";
    _ws = new root.WebSocket(url);
    _ws.onopen = () => {
      // Envoyer le token pour authentifier la connexion (RLS)
      wsSend({topic:"realtime:_", event:"access_token", payload:{access_token:_session.access_token}, ref:String(_wsRef++)});
      // Rejoindre les topics déjà souscrits
      Object.keys(_wsHandlers).forEach(topic => {
        wsSend({topic, event:"phx_join", payload:_wsHandlers[topic].payload, ref:String(_wsRef++)});
      });
      // Heartbeat
      _hbTimer = setInterval(() => {
        wsSend({topic:"phoenix", event:"heartbeat", payload:{}, ref:String(_wsRef++)});
      }, 30_000);
    };
    _ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch(_){ return; }
      const h = _wsHandlers[msg.topic];
      if(!h) return;
      if(msg.event === "postgres_changes" && msg.payload && msg.payload.data){
        try { h.cb(msg.payload.data); } catch(_){}
      }
    };
    _ws.onclose = () => {
      if(_hbTimer){ clearInterval(_hbTimer); _hbTimer = null; }
      _ws = null;
      _reconnectTimer = setTimeout(realtimeConnect, 5000);
    };
    _ws.onerror = () => { /* onclose sera appelé */ };
    return _ws;
  }
  function wsSend(msg){
    if(_ws && _ws.readyState === 1){
      try { _ws.send(JSON.stringify(msg)); } catch(_){}
    }
  }
  function realtimeSubscribeProfiles(orgId, cb){
    const topic = "realtime:public:profiles:organization_id=eq."+orgId;
    _wsHandlers[topic] = {
      cb,
      payload: {
        config: {
          postgres_changes: [{event:"*", schema:"public", table:"profiles", filter:"organization_id=eq."+orgId}]
        }
      }
    };
    realtimeConnect();
    if(_ws && _ws.readyState === 1){
      wsSend({topic, event:"phx_join", payload:_wsHandlers[topic].payload, ref:String(_wsRef++)});
    }
    return () => {
      wsSend({topic, event:"phx_leave", payload:{}, ref:String(_wsRef++)});
      delete _wsHandlers[topic];
    };
  }
  function realtimeDisconnect(){
    if(_reconnectTimer){ clearTimeout(_reconnectTimer); _reconnectTimer = null; }
    if(_hbTimer){ clearInterval(_hbTimer); _hbTimer = null; }
    _wsHandlers = {};
    if(_ws){ try { _ws.close(); } catch(_){} _ws = null; }
  }

  const realtime = {
    subscribeProfiles: realtimeSubscribeProfiles,
    disconnect: realtimeDisconnect,
    isConnected: () => !!(_ws && _ws.readyState === 1)
  };

  /* ---------- API publique ---------- */
  const __API = {
    config: CFG,
    isConfigured,
    auth, org, profiles, sync, realtime, db, rpc,
    // Debug / tests
    __setSessionForTests(s){ _session = s; }
  };

  loadSession();

  if(typeof module !== "undefined" && module.exports){ module.exports = __API; }
  if(typeof root !== "undefined"){ root.BOSSNET = __API; }
})(typeof window !== "undefined" ? window : (typeof globalThis !== "undefined" ? globalThis : this));
</script>
<script>/* ============================================================
   BOSS Admin — Console super-admin cross-tenant
   ============================================================ */
(function(){
"use strict";
const NET = window.BOSSNET;
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
const on = (el,ev,fn) => el && el.addEventListener(ev,fn);
const escapeHtml=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtF=n=>Math.round(Number(n)||0).toLocaleString("fr-FR")+" F";
const fmtInt=n=>Math.round(Number(n)||0).toLocaleString("fr-FR");
const fmtDate=ts=>{ if(!ts) return "—"; const d=new Date(typeof ts==="number"?ts:Date.parse(ts)); return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}); };
const fmtDateTime=ts=>{ if(!ts) return "—"; const d=new Date(typeof ts==="number"?ts:Date.parse(ts)); return d.toLocaleString("fr-FR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); };
const daysBetween=(a,b)=>Math.round((b-a)/86400000);

let _tab = "vue";
let _rows = [];
let _sortKey = "last_activity_at";
let _sortDir = -1;
let _filterText = "";

/* ============ Boot ============ */
async function boot(){
  if(!NET || !NET.isConfigured()){
    document.body.innerHTML = "<div class='login-wrap'><h1>Configuration manquante</h1><div class='sub'>Cette console n'a pas été branchée sur Supabase.</div></div>";
    return;
  }
  try { await NET.auth.captureFromURL(); } catch(_){}
  if(NET.auth.session()){
    try { await NET.auth.me(); } catch(_){}
    if(NET.auth.session()) return afterLogin();
  }
  showLogin();
}

function showLogin(){
  $("#app-shell").style.display="none";
  $("#app-denied").style.display="none";
  $("#app-login").style.display="block";
  on($("#lg-signin"),"click", signInPassword);
  on($("#lg-signup"),"click", signUpPassword);
  on($("#lg-magic"),"click", magicLink);
  on($("#lg-pw"),"keydown", e=>{ if(e.key==="Enter") signInPassword(); });
}
function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function setLoginStatus(html, ok){
  const st=$("#lg-status");
  st.innerHTML = ok===true ? "<span class='ok'>"+html+"</span>"
              : ok===false ? "<span class='err'>"+html+"</span>"
              : html;
}
async function signInPassword(){
  const email=$("#lg-email").value.trim(); const pw=$("#lg-pw").value;
  if(!validEmail(email)){ setLoginStatus("Email invalide.", false); return; }
  if(!pw){ setLoginStatus("Entre ton mot de passe.", false); return; }
  setLoginStatus("Connexion…");
  try{
    await NET.auth.signIn(email, pw);
    setLoginStatus("✅ Connecté", true);
    setTimeout(afterLogin, 400);
  }catch(e){
    const m=(e.message||"").toLowerCase();
    if(m.includes("invalid") || m.includes("credentials")) setLoginStatus("Email ou mot de passe incorrect. Utilise le lien par email si tu as oublié.", false);
    else setLoginStatus("Échec : "+escapeHtml(e.message||"réessaie"), false);
  }
}
async function signUpPassword(){
  const email=$("#lg-email").value.trim(); const pw=$("#lg-pw").value;
  if(!validEmail(email)){ setLoginStatus("Email invalide.", false); return; }
  if(!pw || pw.length<6){ setLoginStatus("Mot de passe : 6 caractères minimum.", false); return; }
  setLoginStatus("Création du compte…");
  try{
    await NET.auth.signUp(email, pw);
    if(NET.auth.session()){ setLoginStatus("✅ Compte créé et connecté", true); setTimeout(afterLogin, 400); }
    else setLoginStatus("✅ Compte créé. Vérifie ton email pour confirmer, puis reviens te connecter.", true);
  }catch(e){
    const m=(e.message||"").toLowerCase();
    if(m.includes("already") || m.includes("registered")) setLoginStatus("Cet email a déjà un compte. Utilise « Se connecter » avec ton mot de passe.", false);
    else setLoginStatus("Échec : "+escapeHtml(e.message||"réessaie"), false);
  }
}
async function magicLink(){
  const email = $("#lg-email").value.trim();
  if(!validEmail(email)){ setLoginStatus("Email invalide.", false); return; }
  setLoginStatus("Envoi du lien…");
  try{
    await NET.auth.magicLink(email, location.origin+"/");
    setLoginStatus("Lien envoyé à <b>"+escapeHtml(email)+"</b>. Regarde ton email (et les spams).", true);
  }catch(e){ setLoginStatus("Échec : "+escapeHtml(e.message||"réessaie"), false); }
}

async function afterLogin(){
  // Vérifier super-admin via RPC
  let isSuper=false;
  try { const r = await NET.rpc("is_super_admin", {}); isSuper = r===true || r==="t"; } catch(e){ isSuper=false; }
  if(!isSuper){
    $("#app-login").style.display="none";
    $("#app-shell").style.display="none";
    $("#app-denied").style.display="block";
    on($("#deny-signout"),"click", async()=>{ await NET.auth.signOut(); location.reload(); });
    return;
  }
  $("#app-login").style.display="none";
  $("#app-denied").style.display="none";
  $("#app-shell").style.display="block";
  renderUserChip();
  wireTabs();
  await loadTab(_tab);
}

function renderUserChip(){
  const u = NET.auth.user();
  const email = u?.email || "—";
  $("#user-chip").innerHTML = "<b>"+escapeHtml(email)+"</b><button class='logout' title='Se déconnecter'>×</button>";
  on($("#user-chip .logout"),"click", async()=>{ await NET.auth.signOut(); location.reload(); });
}

function wireTabs(){
  $$(".tab").forEach(b=>{
    b.onclick = async()=>{
      _tab = b.dataset.t;
      $$(".tab").forEach(x=>x.classList.toggle("on", x===b));
      await loadTab(_tab);
    };
  });
}

async function loadTab(t){
  const body = $("#app-body");
  body.innerHTML = "<div class='muted'>Chargement…</div>";
  try {
    if(t==="vue") return renderVue(body);
    if(t==="clients") return renderClients(body);
    if(t==="rapports") return renderRapports(body);
    if(t==="admins") return renderAdmins(body);
  } catch(e){
    body.innerHTML = "<div class='err'>Erreur : "+escapeHtml(e.message||"—")+"</div>";
  }
}

/* ============ Vue d'ensemble ============ */
async function renderVue(body){
  const stats = await fetchStats();
  const rows = await fetchOrgs();
  const activeCount = rows.filter(r=>isActive(r)).length;
  const paidCount = rows.filter(r=>isPaid(r)).length;
  const trialCount = rows.filter(r=>isTrial(r)).length;
  const lockedCount = rows.filter(r=>r.locked_manually).length;
  const totalCA = rows.reduce((s,r)=>s+Number(r.ca_total_fcfa||0),0);
  const totalBiz = rows.reduce((s,r)=>s+Number(r.business_count||0),0);
  const growth = stats.ca_prev_30j > 0
    ? ((stats.ca_30j - stats.ca_prev_30j) / stats.ca_prev_30j * 100).toFixed(0)
    : (stats.ca_30j>0?"+∞":"—");

  body.innerHTML = `
    <h1>Vue d'ensemble</h1>
    <div class="muted">État de la flotte BOSS · mise à jour ${fmtDateTime(Date.now())}</div>

    <div class="cards">
      <div class="card gold"><div class="lbl">Total organisations</div><div class="val">${fmtInt(rows.length)}</div><div class="sub">${fmtInt(activeCount)} actives 30j</div></div>
      <div class="card ok"><div class="lbl">Clients payants</div><div class="val">${fmtInt(paidCount)}</div><div class="sub">${fmtInt(trialCount)} en essai</div></div>
      <div class="card ${lockedCount>0?'danger':'info'}"><div class="lbl">Comptes verrouillés</div><div class="val">${fmtInt(lockedCount)}</div><div class="sub">manuellement</div></div>
      <div class="card"><div class="lbl">Businesses gérés</div><div class="val">${fmtInt(totalBiz)}</div><div class="sub">cumulé</div></div>
      <div class="card gold"><div class="lbl">CA cumulé</div><div class="val">${fmtF(totalCA)}</div><div class="sub">tous clients confondus</div></div>
      <div class="card ${Number(growth)>=0?'ok':'danger'}"><div class="lbl">CA 30 derniers jours</div><div class="val">${fmtF(stats.ca_30j)}</div><div class="sub">${growth>=0?'+':''}${growth}% vs 30j précédents</div></div>
      <div class="card info"><div class="lbl">Nouvelles inscriptions 30j</div><div class="val">${fmtInt(stats.signups_30j)}</div><div class="sub">${fmtInt(stats.total_users)} utilisateurs au total</div></div>
    </div>

    <h2>Derniers clients actifs</h2>
    <div id="vue-table"></div>`;

  const recent = rows.slice().sort((a,b)=>Date.parse(b.last_activity_at||0)-Date.parse(a.last_activity_at||0)).slice(0,10);
  $("#vue-table").innerHTML = renderOrgTable(recent, true);
  wireOrgTable();
}

/* ============ Clients (liste complète) ============ */
async function renderClients(body){
  _rows = await fetchOrgs();
  body.innerHTML = `
    <h1>Clients</h1>
    <div class="muted">${fmtInt(_rows.length)} organisations enregistrées</div>
    <div class="toolbar">
      <input class="search" id="cli-search" placeholder="Rechercher un client, email, statut…">
      <button class="btn" id="cli-export-csv">📥 Exporter CSV</button>
      <button class="btn" id="cli-refresh">🔄 Rafraîchir</button>
    </div>
    <div id="cli-table"></div>`;
  on($("#cli-search"),"input", e=>{ _filterText = e.target.value.toLowerCase(); renderClientsTable(); });
  on($("#cli-refresh"),"click", async()=>{ _rows = await fetchOrgs(); renderClientsTable(); });
  on($("#cli-export-csv"),"click", exportCSV);
  renderClientsTable();
}

function renderClientsTable(){
  const filtered = _rows.filter(r=>{
    if(!_filterText) return true;
    const hay = (r.nom+" "+(r.owner_email||"")+" "+statusLabel(r)).toLowerCase();
    return hay.includes(_filterText);
  });
  filtered.sort((a,b)=>{
    let va=a[_sortKey], vb=b[_sortKey];
    if(typeof va==="string"){ va=va.toLowerCase(); vb=(vb||"").toLowerCase(); }
    if(va<vb) return -1*_sortDir;
    if(va>vb) return 1*_sortDir;
    return 0;
  });
  $("#cli-table").innerHTML = renderOrgTable(filtered, true);
  wireOrgTable();
}

function renderOrgTable(rows, clickable){
  if(!rows.length) return "<div class='muted'>Aucune organisation.</div>";
  const th = (k, label, num) => `<th data-sort="${k}" class="${num?'num':''}">${escapeHtml(label)}${_sortKey===k?(_sortDir>0?" ▲":" ▼"):""}</th>`;
  const body = rows.map(r=>{
    const st = statusLabel(r);
    return `<tr class="${clickable?'row-click':''}" data-id="${r.organization_id}">
      <td><b>${escapeHtml(r.nom)}</b></td>
      <td>${escapeHtml(r.owner_email||"—")}</td>
      <td><span class="badge b-${statusKey(r)}">${escapeHtml(st)}</span></td>
      <td class="num">${fmtF(r.ca_total_fcfa)}</td>
      <td class="num">${fmtInt(r.business_count)}</td>
      <td class="num">${fmtInt(r.membres_count)}</td>
      <td>${fmtDateTime(r.last_activity_at)}</td>
    </tr>`;
  }).join("");
  return `<div style="overflow:auto"><table>
    <thead><tr>
      ${th("nom","Client",false)}
      ${th("owner_email","Email propriétaire",false)}
      ${th("_status","Statut",false)}
      ${th("ca_total_fcfa","CA total",true)}
      ${th("business_count","Business",true)}
      ${th("membres_count","Membres",true)}
      ${th("last_activity_at","Dernière activité",false)}
    </tr></thead>
    <tbody>${body}</tbody>
  </table></div>`;
}
function wireOrgTable(){
  $$("th[data-sort]").forEach(t=>{
    t.onclick = ()=>{
      const k = t.dataset.sort;
      if(_sortKey===k) _sortDir *= -1; else { _sortKey=k; _sortDir = k==="ca_total_fcfa"||k==="business_count"||k==="membres_count"||k==="last_activity_at"?-1:1; }
      renderClientsTable();
    };
  });
  $$(".row-click").forEach(r=>r.onclick = ()=>openDetail(r.dataset.id));
}

/* ============ Détail client ============ */
async function openDetail(orgId){
  const org = _rows.find(r=>r.organization_id===orgId) || (await fetchOrgs()).find(r=>r.organization_id===orgId);
  if(!org){ alert("Introuvable"); return; }
  const members = await NET.db("memberships").select({organization_id:"eq."+orgId}).catch(()=>[]);
  const profiles = await NET.db("profiles").select({organization_id:"eq."+orgId, deleted_at:"is.null"}).catch(()=>[]);
  const audit = await NET.db("audit_log").select({organization_id:"eq."+orgId, order:"created_at.desc", limit:"10"}).catch(()=>[]);
  const now = Date.now();

  const daysLeftPaid = org.paid_until_ms > now ? Math.ceil((org.paid_until_ms-now)/86400000) : 0;
  const trialEndMs = (Number(org.installed_at_ms)||now) + (org.trial_days||90)*86400000;
  const daysLeftTrial = trialEndMs > now ? Math.ceil((trialEndMs-now)/86400000) : 0;

  const businessRows = profiles.map(p=>{
    const d = p.data||{};
    const nb = (d.caisse||[]).length;
    return `<tr>
      <td><b>${escapeHtml(d.name||"—")}</b></td>
      <td>${escapeHtml(d.metier||"—")}</td>
      <td class="num">${fmtInt((d.revenus||[]).length)}</td>
      <td class="num">${fmtInt(nb)} écritures</td>
      <td>${fmtDateTime(p.updated_at)}</td>
    </tr>`;
  }).join("");

  const membersRows = members.map(m=>`<tr><td>${escapeHtml(m.nom||m.user_id.slice(0,8))}</td><td>${escapeHtml(m.role)}</td><td>${fmtDate(m.created_at)}</td></tr>`).join("");
  const auditRows = audit.map(a=>`<tr><td>${fmtDateTime(a.created_at)}</td><td>${escapeHtml(a.action)}</td><td>${escapeHtml(a.actor_email||"—")}</td></tr>`).join("");

  openModal(`
    <h2>${escapeHtml(org.nom)}</h2>
    <div class="muted">${escapeHtml(org.owner_email||"—")} · créée ${fmtDate(org.created_at)}</div>
    <div class="detail-grid">
      <div class="detail-card"><div class="k">Statut licence</div><div class="v"><span class="badge b-${statusKey(org)}">${escapeHtml(statusLabel(org))}</span></div></div>
      <div class="detail-card"><div class="k">CA total</div><div class="v">${fmtF(org.ca_total_fcfa)}</div></div>
      <div class="detail-card"><div class="k">Businesses</div><div class="v">${fmtInt(org.business_count)}</div></div>
      <div class="detail-card"><div class="k">Membres</div><div class="v">${fmtInt(org.membres_count)}</div></div>
      <div class="detail-card"><div class="k">Payé jusqu'au</div><div class="v">${org.paid_until_ms>0?fmtDate(org.paid_until_ms):"—"}${daysLeftPaid>0?` <span class="muted">(${daysLeftPaid}j)</span>`:""}</div></div>
      <div class="detail-card"><div class="k">Essai restant</div><div class="v">${daysLeftTrial>0?daysLeftTrial+" j":"expiré"}</div></div>
      <div class="detail-card"><div class="k">Dernière activité</div><div class="v">${fmtDateTime(org.last_activity_at)}</div></div>
      <div class="detail-card"><div class="k">Écritures totales</div><div class="v">${fmtInt(org.ecritures_count)}</div></div>
    </div>

    <div class="actions-row">
      ${org.locked_manually
        ? `<button class="btn primary" data-act="unlock" data-id="${org.organization_id}">🔓 Déverrouiller</button>`
        : `<button class="btn danger" data-act="lock" data-id="${org.organization_id}">🔒 Verrouiller</button>`}
      <button class="btn primary" data-act="paid30" data-id="${org.organization_id}">Marquer payé +30j</button>
      <button class="btn" data-act="paid90" data-id="${org.organization_id}">+90 jours</button>
      <button class="btn" data-act="paid365" data-id="${org.organization_id}">+1 an</button>
      <button class="btn" data-act="reset_trial" data-id="${org.organization_id}">Rétablir essai 90j</button>
    </div>

    <h2>Businesses (${profiles.length})</h2>
    <div style="overflow:auto">
      <table><thead><tr><th>Nom</th><th>Métier</th><th class="num">Produits</th><th class="num">Activité</th><th>Modifié</th></tr></thead>
      <tbody>${businessRows||"<tr><td colspan=5 class='muted'>Aucun business</td></tr>"}</tbody></table>
    </div>

    <h2>Membres (${members.length})</h2>
    <div style="overflow:auto">
      <table><thead><tr><th>Nom</th><th>Rôle</th><th>Rejoint</th></tr></thead>
      <tbody>${membersRows||"<tr><td colspan=3 class='muted'>Aucun membre</td></tr>"}</tbody></table>
    </div>

    <h2>Derniers événements</h2>
    <div style="overflow:auto">
      <table><thead><tr><th>Quand</th><th>Action</th><th>Auteur</th></tr></thead>
      <tbody>${auditRows||"<tr><td colspan=3 class='muted'>Aucun événement</td></tr>"}</tbody></table>
    </div>
  `);
  $$("[data-act]").forEach(b=>b.onclick = ()=>orgAction(b.dataset.act, b.dataset.id));
}

async function orgAction(act, orgId){
  if(!confirm("Confirmer l'action « "+act+" » sur cette organisation ?")) return;
  let action, days=null;
  if(act==="lock") action="lock";
  else if(act==="unlock") action="unlock";
  else if(act==="paid30"){ action="mark_paid"; days=30; }
  else if(act==="paid90"){ action="mark_paid"; days=90; }
  else if(act==="paid365"){ action="mark_paid"; days=365; }
  else if(act==="reset_trial"){ action="reset_trial"; days=90; }
  try{
    await NET.rpc("admin_org_action", {p_org: orgId, p_action: action, p_days: days});
    closeModal();
    _rows = await fetchOrgs();
    if(_tab==="clients") renderClientsTable();
    else await loadTab(_tab);
  }catch(e){ alert("Échec : "+(e.message||"—")); }
}

/* ============ Rapports (dashboard banque) ============ */
async function renderRapports(body){
  const stats = await fetchStats();
  const monthly = await fetchMonthlyRevenue();
  const rows = _rows.length ? _rows : await fetchOrgs();

  const growth = stats.ca_prev_30j > 0
    ? ((stats.ca_30j - stats.ca_prev_30j) / stats.ca_prev_30j * 100).toFixed(1)
    : "—";
  const avgCA = rows.length ? Math.round(Number(stats.total_ca_fcfa)/rows.length) : 0;

  body.innerHTML = `
    <h1>Rapports pour la banque</h1>
    <div class="muted">Vue synthétique de la performance globale, exportable pour dossier de financement.</div>

    <div class="cards">
      <div class="card gold"><div class="lbl">Chiffre d'affaires cumulé</div><div class="val">${fmtF(stats.total_ca_fcfa)}</div><div class="sub">tous clients, depuis toujours</div></div>
      <div class="card ok"><div class="lbl">CA généré 30 derniers jours</div><div class="val">${fmtF(stats.ca_30j)}</div><div class="sub">${growth>=0?"+":""}${growth}% vs mois précédent</div></div>
      <div class="card"><div class="lbl">CA moyen par client</div><div class="val">${fmtF(avgCA)}</div><div class="sub">sur ${fmtInt(rows.length)} clients</div></div>
      <div class="card info"><div class="lbl">Clients payants actifs</div><div class="val">${fmtInt(stats.paying_orgs)}</div><div class="sub">${fmtInt(stats.active_orgs)} actifs 30j au total</div></div>
      <div class="card"><div class="lbl">Nouveaux clients / mois</div><div class="val">${fmtInt(stats.signups_30j)}</div><div class="sub">taux d'acquisition</div></div>
      <div class="card"><div class="lbl">Écosystème BOSS</div><div class="val">${fmtInt(stats.total_businesses)}</div><div class="sub">businesses gérés</div></div>
    </div>

    <h2>Évolution 12 mois</h2>
    ${renderMonthlyBars(monthly)}

    <div class="toolbar" style="margin-top:20px">
      <button class="btn primary" id="rpt-csv-orgs">📥 Export tous les clients (CSV)</button>
      <button class="btn" id="rpt-csv-monthly">📥 Export CA mensuel (CSV)</button>
      <button class="btn" id="rpt-print">🖨️ Version imprimable (PDF)</button>
    </div>
  `;
  on($("#rpt-csv-orgs"),"click", exportCSV);
  on($("#rpt-csv-monthly"),"click", ()=>exportCSVCustom("ca-mensuel.csv",
    "mois;organization_id;ca_fcfa;depenses_fcfa;ecritures",
    monthly.map(m=>[m.mois,m.organization_id,m.ca_fcfa,m.depenses_fcfa,m.ecritures].join(";"))
  ));
  on($("#rpt-print"),"click", ()=>window.print());
}

function renderMonthlyBars(monthly){
  if(!monthly.length) return "<div class='muted'>Pas encore de données.</div>";
  // Agrège tous clients confondus par mois
  const byMonth = {};
  monthly.forEach(r=>{
    const key = String(r.mois).slice(0,7);
    if(!byMonth[key]) byMonth[key] = { mois:key, ca:0, dep:0 };
    byMonth[key].ca += Number(r.ca_fcfa||0);
    byMonth[key].dep += Number(r.depenses_fcfa||0);
  });
  const arr = Object.values(byMonth).sort((a,b)=>a.mois.localeCompare(b.mois));
  const max = Math.max(1, ...arr.map(x=>x.ca));
  const bars = arr.map(x=>{
    const h = Math.round((x.ca/max)*140);
    const lbl = x.mois.split("-")[1]+"/"+x.mois.slice(2,4);
    return `<div style="display:flex;flex-direction:column;align-items:center;min-width:56px">
      <div style="font-size:11px;color:var(--cream-dim);margin-bottom:4px">${fmtF(x.ca)}</div>
      <div style="width:32px;height:${h}px;background:var(--gold);border-radius:6px 6px 0 0" title="${lbl} : ${fmtF(x.ca)}"></div>
      <div style="font-size:11px;color:var(--cream-dim);margin-top:6px">${lbl}</div>
    </div>`;
  }).join("");
  return `<div style="background:var(--char);border:1px solid var(--line);border-radius:12px;padding:20px;overflow:auto"><div style="display:flex;gap:10px;align-items:flex-end">${bars}</div></div>`;
}

/* ============ Super-admins ============ */
async function renderAdmins(body){
  const admins = await NET.db("super_admins").select({order:"granted_at.asc"}).catch(()=>[]);
  body.innerHTML = `
    <h1>Super-admins</h1>
    <div class="muted">Personnes ayant accès à cette console. Seul un super-admin peut en ajouter/supprimer.</div>
    <div style="margin-top:14px;overflow:auto">
      <table><thead><tr><th>User ID</th><th>Ajouté le</th><th>Note</th><th></th></tr></thead>
      <tbody>${admins.map(a=>`<tr><td><code style="font-size:11.5px">${escapeHtml(a.user_id)}</code></td><td>${fmtDate(a.granted_at)}</td><td>${escapeHtml(a.note||"—")}</td>
        <td><button class="btn danger" data-del="${a.user_id}">Retirer</button></td></tr>`).join("") || "<tr><td colspan=4 class='muted'>Aucun</td></tr>"}</tbody></table>
    </div>

    <h2>Ajouter un super-admin</h2>
    <div class="muted">L'utilisateur doit d'abord avoir un compte sur BOSS (via <b>boss.ordre-x.com</b>).</div>
    <div class="toolbar" style="margin-top:10px">
      <input class="search" id="sa-uid" placeholder="user_id UUID (visible dans Supabase → Auth → Users)">
      <input class="search" id="sa-note" placeholder="Note (optionnel)" style="min-width:180px;flex:0">
      <button class="btn primary" id="sa-add">Ajouter</button>
    </div>
    <div id="sa-status" class="muted"></div>
  `;
  $$("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Retirer les droits super-admin de cet utilisateur ?")) return;
    try{
      await NET.db("super_admins").remove({user_id:"eq."+b.dataset.del});
      renderAdmins(body);
    }catch(e){ alert("Échec : "+(e.message||"—")); }
  });
  on($("#sa-add"),"click", async()=>{
    const uid = $("#sa-uid").value.trim();
    const note = $("#sa-note").value.trim();
    const st = $("#sa-status");
    if(!/^[0-9a-f-]{36}$/i.test(uid)){ st.textContent="UUID invalide."; return; }
    try{
      await NET.db("super_admins").insert({user_id: uid, note: note||null});
      st.textContent="Ajouté ✅";
      setTimeout(()=>renderAdmins(body), 500);
    }catch(e){ st.textContent="Échec : "+(e.message||"—"); }
  });
}

/* ============ Helpers licence ============ */
function isPaid(org){ return Number(org.paid_until_ms||0) > Date.now(); }
function isTrial(org){
  const inst = Number(org.installed_at_ms)||Date.now();
  const trialEnd = inst + (org.trial_days||90)*86400000;
  return !isPaid(org) && !org.locked_manually && Date.now() < trialEnd;
}
function isActive(org){
  const t = org.last_activity_at ? Date.parse(org.last_activity_at) : 0;
  return t > Date.now() - 30*86400000;
}
function statusKey(org){
  if(org.locked_manually) return "locked";
  if(isPaid(org)) return "active";
  if(isTrial(org)) return "trial";
  const inst = Number(org.installed_at_ms)||Date.now();
  const trialEnd = inst + (org.trial_days||90)*86400000;
  const grace = trialEnd + 48*3600000;
  if(Date.now() < grace) return "grace";
  return "locked";
}
function statusLabel(org){
  return { active:"Payé", trial:"Essai", grace:"Grâce 48h", locked:"Verrouillé" }[statusKey(org)];
}

/* ============ Export CSV ============ */
function exportCSV(){
  const header = "nom;email_proprietaire;statut;ca_total_fcfa;business;membres;creation;derniere_activite;paid_until";
  const lines = _rows.map(r=>[
    (r.nom||"").replace(/;/g,","),
    (r.owner_email||"").replace(/;/g,","),
    statusLabel(r),
    r.ca_total_fcfa||0,
    r.business_count||0,
    r.membres_count||0,
    r.created_at||"",
    r.last_activity_at||"",
    r.paid_until_ms>0 ? new Date(r.paid_until_ms).toISOString() : ""
  ].join(";"));
  exportCSVCustom("boss-clients-"+today()+".csv", header, lines);
}
function exportCSVCustom(name, header, lines){
  const blob = new Blob([header+"\n"+lines.join("\n")], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function today(){ const d=new Date(); const pad=n=>String(n).padStart(2,"0"); return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()); }
